{% extends "base.html" %}

{% block title %}mysim — Fehler{% endblock %}

{% block content %}
<section class="error-view">
    <h1>{{ error_title }}</h1>
    <div class="error-message">
        <p>{{ error_message }}</p>
    </div>
    <div class="error-actions">
        {% if scenario_name %}
        <a href="{{ url_for('main.configure', name=scenario_name) }}" class="btn btn-secondary">Zurück zum Szenario</a>
        {% endif %}
        <a href="{{ url_for('main.index') }}" class="btn btn-primary">Zur Übersicht</a>
    </div>
</section>
{% endblock %}
